---
# FastAPI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  labels:
    app: electro-treasur
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: electro-treasur
      component: backend
  template:
    metadata:
      labels:
        app: electro-treasur
        component: backend
    spec:
      containers:
        - name: fastapi
          image: ghcr.io/electro-treasur/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: electro-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: electro-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# FastAPI Service
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  labels:
    app: electro-treasur
    component: backend
spec:
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: electro-treasur
    component: backend
  type: ClusterIP
